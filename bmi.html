      max-width: 450px;

    }

    .form-control {
      background: #1c1c1c;
      border: none;
      color: #fff;
    }

    .form-control:focus {
      background: #1c1c1c;
      color: #fff;
      box-shadow: none;
    }

    .btn-bmi {
      background: #e50914;
      color: #fff;
      width: 100%;
      border-radius: 3px;

    }

    }

    .result {
      margin-top: 20px;
      text-align: center;
      font-size: 18px;
    }
  </style>

<div class="bmi-box">
  <h2>BMI Calculator</h2>

  <div class="mb-3">
    <label>Height (cm)</label>
    <input type="number" id="height" class="form-control" placeholder="Enter height">
  </div>

  <div class="mb-3">
    <label>Weight (kg)</label>
    <input type="number" id="weight" class="form-control" placeholder="Enter weight">
  </div>

  <button class="btn btn-bmi" onclick="calculateBMI()">Calculate BMI</button>

  <div class="result" id="result"></div>
</div>

<script>
  function calculateBMI() {
    let height = document.getElementById("height").value;
    let weight = document.getElementById("weight").value;

    if (height === "" || weight === "") {
      document.getElementById("result").innerHTML = "Please enter all values";
      return;
    }

    let bmi = (weight / ((height / 100) ** 2)).toFixed(1);
    let status = "";

    if (bmi < 18.5) {
      status = "Underweight";
    } else if (bmi < 25) {
      status = "Normal";
    } else if (bmi < 30) {
      status = "Overweight";
    } else {
      status = "Obese";
    }

    document.getElementById("result").innerHTML =
      `Your BMI: <strong>${bmi}</strong><br>Status: <span style="color:#e50914">${status}</span>`;
  }
</script>

</body>
