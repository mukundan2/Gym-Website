    .signup-card {
      background: #111;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }
    .btn-red {
      background: #ff3c3c;
      color: white;
    }
    .btn-red:hover {
      background: #e60000;
    }
    a {
      color: #ff3c3c;
      text-decoration: none;
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">
 <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top d-flex justify-content">
  <div class="container">
     <i class="fa-solid fa-dumbbell me-2 text-danger"></i>
    <a class="navbar-brand" href="#">IRON EDGE</a>

    <!-- Hamburger -->
    <button class="navbar-toggler" type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menu -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto gap-3">
         <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>

  <div class="signup-card col-md-4">
    <h3 class="text-center mb-4">Create Account</h3>

    <form>
      <div class="mb-3">
        <label>Full Name</label>
        <input type="text" class="form-control" placeholder="Enter name">
      </div>

      <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="Enter email">
      </div>

      <div class="mb-3">
        <label>Password</label>
        <input type="password" class="form-control" placeholder="Create password">
      </div>

      <div class="mb-3">
        <label>Confirm Password</label>
        <input type="password" class="form-control" placeholder="Confirm password">
      </div>

      <button class="btn btn-red w-100">Sign Up</button>

      <p class="text-center mt-3">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </form>
  </div>
