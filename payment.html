<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment | IRON EDGE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-dark text-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card shadow">
        <div class="card-body">

          <h3 class="text-center mb-4">Gym Membership Payment</h3>

          <!-- Plan -->
          <div class="mb-3">
            <label class="form-label">Select Plan</label>
            <select class="form-select" id="plan">
              <option value="1000">1 Month - ₹1000</option>
              <option value="2700">3 Months - ₹2700</option>
              <option value="5000">6 Months - ₹5000</option>
            </select>
          </div>

          <!-- Payment Method -->
          <div class="mb-3">
            <label class="form-label">Payment Method</label>
            <select class="form-select">
              <option>UPI</option>
              <option>Debit Card</option>
              <option>Credit Card</option>
              <option>Cash</option>
            </select>
          </div>

          <!-- Amount -->
          <div class="alert alert-secondary text-center">
            Total Amount: <strong>₹<span id="amount">1000</span></strong>
          </div>

          <!-- Button -->
          <div class="d-grid">
            <button class="btn btn-danger" id="payBtn">
              Pay Now
            </button>
          </div>

          <!-- Message -->
          <p class="text-success text-center mt-3" id="msg"></p>

        </div>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="main.js"></script>
</body>
</html>
