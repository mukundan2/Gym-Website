    <section  class="contact-section py-5">
  <div class="container">

    <h2 class="text-center">Contact Us</h2>
    <p class="text-center mb-5">
      Get in touch with us to start your fitness journey
    </p>

    <div class="row">

      <!-- Contact Form -->
      <div class="col-md-6">
        <form id="contact">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" placeholder="Enter your name">
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Enter your email">
          </div>

          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" placeholder="Enter your phone number" maxlength="10">
          </div>

          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="4" placeholder="Your message"></textarea>
          </div>

          <button type="submit" class="weight-join">
            Send Enquiry
          </button>
        </form>
      </div>

      <!-- Contact Info -->
      <div class="col-md-6">
        <div class="p-4 bg-light rounded">

          <h4>Gym Information</h4>
          <p><strong>Address:</strong> Coimbatore, Tamil Nadu</p>
          <p><strong>Phone:</strong> +91 98765 43210</p>
          <p><strong>Email:</strong> fitlife@gym.com</p>
          <p><strong>Timings:</strong> 5 AM – 10 PM</p>

          <a href="#" class="weight-join mt-3 d-inline-block">
            Call Now
          </a>

        </div>
      </div>

    </div>
  </div>
